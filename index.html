// ---------- Animation helpers ----------
const ease = [0.16, 1, 0.3, 1];
const cardEase = [0.22, 1, 0.36, 1];

// WordsPullUp
function WordsPullUp({ text, className = '', showAsterisk = false, wordClassName = '' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, amount: 0.1 });
  const words = text.split(' ');
  return (
    <div ref={ref} className={className} style={{ display: 'inline-flex', flexWrap: 'wrap', position: 'relative' }}>
      {words.map((w, i) => (
        <motion.span
          key={`w-${i}`}
          initial={{ y: 20, opacity: 0 }}
          animate={inView ? { y: 0, opacity: 1 } : { y: 20, opacity: 0 }}
          transition={{ duration: 0.8, delay: i * 0.08, ease }}
          className={wordClassName}
          style={{ display: 'inline-block', position: 'relative', marginRight: '0.22em' }}
        >
          {w}
          {i === words.length - 1 && showAsterisk ? (
            <i style={{ position: 'absolute', top: '0.06em', right: '-0.28em', fontSize: '0.31em', lineHeight: 1, fontStyle: 'normal' }}>*</i>
          ) : null}
        </motion.span>
      ))}
    </div>
  );
}

// WordsPullUpMultiStyle — array of { text, className }
function WordsPullUpMultiStyle({ segments, container = '' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, amount: 0.1 });
  const words = [];
  segments.forEach(seg => {
    seg.text.split(' ').filter(Boolean).forEach(w => words.push({ w, cn: seg.className || '' }));
  });
  return (
    <div ref={ref} className={`inline-flex flex-wrap justify-center ${container}`}>
      {words.map((item, i) => (
        <motion.span
          key={i}
          initial={{ y: 20, opacity: 0 }}
          animate={inView ? { y: 0, opacity: 1 } : { y: 20, opacity: 0 }}
          transition={{ duration: 0.8, delay: i * 0.08, ease }}
          className={item.cn}
          style={{ display: 'inline-block', marginRight: '0.22em' }}
        >
          {item.w}
        </motion.span>
      ))}
    </div>
  );
}

// Block-by-block pull up for multi-paragraph text
function BlocksPullUp({ blocks, className = '', blockClassName = '' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, amount: 0.1 });
  return (
    <div ref={ref} className={className}>
      {blocks.map((block, i) => (
        <motion.div
          key={i}
          initial={{ y: 20, opacity: 0 }}
          animate={inView ? { y: 0, opacity: 1 } : { y: 20, opacity: 0 }}
          transition={{ duration: 0.8, delay: i * 0.25, ease }}
          className={blockClassName}
        >
          {block}
        </motion.div>
      ))}
    </div>
  );
}

      href={href}

      animate={inView ? { scale: 1, opacity: 1 } : { scale: 0.95, opacity: 0 }}
      transition={{ duration: 0.9, delay: index * 0.15, ease: cardEase }}
      className={`group relative overflow-hidden rounded-2xl block transition-transform duration-500 hover:scale-[1.02] ${className}`}
      style={style}
    >
      {children}
    </motion.a>

}

function Footer() {
  const [copiedEmail, setCopiedEmail] = useState(false);
  const [copiedPhone, setCopiedPhone] = useState(false);
  const email = 'Phosynd@gmail.com';
  const phone = '010-5584-8101';

  const copy = async (text, setFlag) => {
    try {
      await navigator.clipboard.writeText(text);
      setFlag(true);
      setTimeout(() => setFlag(false), 2000);
    } catch (err) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); setFlag(true); setTimeout(() => setFlag(false), 2000); } catch(_) {}
      document.body.removeChild(ta);
    }
  };

  const checkIcon = <Check className="w-4 h-4 sm:w-[18px] sm:h-[18px]" strokeWidth={2.5} style={{ color: '#FFFFFF' }} />;

  return (
    <footer id="contact" className="bg-black px-4 md:px-6 py-20 md:py-32 border-t border-white/5">
      <div className="max-w-5xl mx-auto text-center">

          Contact

          <WordsPullUp text="저와 이야기를 나누고 싶다면" />
        </h2>

        <p className="text-primary/70 text-sm sm:text-base md:text-lg max-w-2xl mx-auto mb-12 sm:mb-16 leading-relaxed">
          좋은 질문을 가진 분이라면 누구든 환영합니다.<br/>
          채용 제안도, 협업 제안도, 그냥 대화도.<br/>
          본질이 맞닿는 곳에서 좋은 일이 생깁니다.
        </p>

        <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center items-center">
          <ContactButton
            value={email}
            copied={copiedEmail}
            onClick={() => copy(email, setCopiedEmail)}
            icon={<Copy className="w-4 h-4 sm:w-[18px] sm:h-[18px]" strokeWidth={2.5} style={{ color: '#FFFFFF' }} />}
            copiedIcon={checkIcon}
          />
          <ContactButton
            value={phone}
            copied={copiedPhone}
            onClick={() => copy(phone, setCopiedPhone)}
            icon={<Phone className="w-4 h-4 sm:w-[18px] sm:h-[18px]" strokeWidth={2.5} style={{ color: '#FFFFFF' }} />}
            copiedIcon={checkIcon}
          />
        </div>

        <div className="mt-20 sm:mt-28 text-[10px] sm:text-xs text-gray-500 mono uppercase tracking-widest">
